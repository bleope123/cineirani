<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#c8a96e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cine Iraní">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>سینمای ایران — Cine Iraní</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0c0a;
    color: #e8dcc8;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(180deg, #1a1508 0%, #0d0c0a 100%);
    border-bottom: 1px solid #3a3020;
    padding: 1.5rem 1rem 1rem;
  }
  header .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: #a09070;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  header h1 { font-size: 1.8rem; font-weight: normal; color: #e8dcc8; }
  header p { color: #8a7a5a; font-size: 0.85rem; font-style: italic; margin-top: 0.3rem; }

  .controls {
    background: #110f0a;
    border-bottom: 1px solid #2a2010;
    padding: 0.8rem 1rem;
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .controls-row { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
  .sort-btn {
    padding: 0.3rem 0.6rem;
    background: transparent;
    color: #8a7a5a;
    border: 1px solid #3a3020;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.72rem;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-btn.active { background: #c8a96e; color: #0d0c0a; border-color: #c8a96e; }
  select {
    background: #1a1508;
    color: #c8b890;
    border: 1px solid #3a3020;
    border-radius: 3px;
    padding: 0.3rem 0.5rem;
    font-size: 0.72rem;
    font-family: inherit;
    cursor: pointer;
    flex: 1;
    min-width: 130px;
  }
  .count { padding: 0.6rem 1rem 0; font-size: 0.72rem; color: #5a4a30; letter-spacing: 0.1em; }
  .films-grid { padding: 0.8rem 1rem 2rem; display: flex; flex-direction: column; gap: 0.7rem; }

  .film-card {
    border: 1px solid #2a2010;
    border-left: 3px solid var(--col);
    border-radius: 4px;
    padding: 1rem;
    cursor: pointer;
    background: #110f0a;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .film-card.open { background: #1a1508; border-color: var(--col); }
  .film-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
  .film-year { font-size: 0.75rem; color: var(--col); letter-spacing: 0.1em; }
  .film-diff { font-size: 0.62rem; padding: 0.15rem 0.5rem; border-radius: 2px; letter-spacing: 0.04em; }
  .diff-a { background: #1a3020; color: #6ab080; }
  .diff-i { background: #2a2010; color: #c8a96e; }
  .diff-v { background: #2a1010; color: #c87070; }
  .film-title { font-size: 0.98rem; font-weight: normal; color: #e8dcc8; line-height: 1.3; margin-bottom: 0.15rem; }
  .film-original { font-size: 0.72rem; color: #5a4a30; font-style: italic; margin-bottom: 0.4rem; }
  .film-director { font-size: 0.72rem; color: #8a7a5a; margin-bottom: 0.5rem; }
  .film-desc { font-size: 0.82rem; color: #a09070; line-height: 1.5; margin-bottom: 0.7rem; }
  .film-themes { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .theme-tag { font-size: 0.62rem; padding: 0.12rem 0.45rem; background: #1a1810; border: 1px solid #3a3020; border-radius: 2px; color: #7a6a4a; }
  .film-extra { margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid #2a2010; display: none; }
  .film-card.open .film-extra { display: block; }
  .film-extra-row { font-size: 0.72rem; color: #8a7a5a; margin-bottom: 0.3rem; line-height: 1.4; }

  footer { border-top: 1px solid #2a2010; padding: 1.2rem 1rem; background: #080705; }
  .footer-label { font-size: 0.62rem; letter-spacing: 0.2em; color: #3a3020; text-transform: uppercase; margin-bottom: 0.7rem; }
  .director-legend { display: flex; flex-direction: column; gap: 0.5rem; }
  .dir-item { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.3rem 0; -webkit-tap-highlight-color: transparent; }
  .dir-dot { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
  .dir-name { font-size: 0.78rem; color: #8a7a5a; }
  .dir-count { font-size: 0.68rem; color: #3a3020; }
  .dir-item.dimmed { opacity: 0.3; }
  .no-results { text-align: center; color: #5a4a30; font-style: italic; padding: 3rem 1rem; font-size: 0.9rem; }

  /* Install banner */
  #install-banner {
    display: none;
    background: #1a1508;
    border-bottom: 1px solid #c8a96e;
    padding: 0.7rem 1rem;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  #install-banner.show { display: flex; }
  #install-banner span { font-size: 0.78rem; color: #c8b890; }
  #install-btn {
    background: #c8a96e;
    color: #0d0c0a;
    border: none;
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    font-size: 0.75rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  #dismiss-btn { background: none; border: none; color: #5a4a30; font-size: 1.2rem; cursor: pointer; padding: 0 0.3rem; }
</style>
</head>
<body>

<!-- Install banner -->
<div id="install-banner">
  <span>📱 Instalá como app en tu celu</span>
  <button id="install-btn">Instalar</button>
  <button id="dismiss-btn">✕</button>
</div>

<header>
  <div class="eyebrow">Cinematografía Iraní</div>
  <h1>سینمای ایران</h1>
  <p id="subtitle">25 películas · 6 directores · 1987–2024</p>
</header>

<div class="controls">
  <div class="controls-row" id="sort-row">
    <span style="font-size:0.65rem;color:#5a4a30;letter-spacing:0.1em;margin-right:0.2rem">ORDEN</span>
    <button class="sort-btn active" data-sort="year_asc">Año ↑</button>
    <button class="sort-btn" data-sort="year_desc">Año ↓</button>
    <button class="sort-btn" data-sort="director">Director</button>
    <button class="sort-btn" data-sort="difficulty">Dificultad</button>
  </div>
  <div class="controls-row">
    <select id="sel-director"><option value="">Todos los directores</option></select>
    <select id="sel-difficulty">
      <option value="">Toda dificultad</option>
      <option>Accesible</option><option>Iniciado</option><option>Avanzado</option>
    </select>
  </div>
  <div class="controls-row">
    <select id="sel-theme"><option value="">Toda temática</option></select>
  </div>
</div>

<div class="count" id="count-label"></div>
<div class="films-grid" id="films-grid"></div>

<footer>
  <div class="footer-label">Directores — tocá para filtrar</div>
  <div class="director-legend" id="dir-legend"></div>
</footer>

<script>
const films = [
  { title:"¿Dónde está la casa de mi amigo?", original:"Khane-ye doust kodjast?", director:"Abbas Kiarostami", year:1987, theme:["Infancia","Vida rural","Responsabilidad"], region:"Norte (Gilan/Koker)", awards:["Leopardo de Bronce Locarno"], desc:"Un niño recorre dos aldeas buscando el cuaderno de su compañero. El más puro retrato de la vida rural del norte iraní.", difficulty:"Accesible", color:"#c8a96e" },
  { title:"Close-Up", original:"Nema-ye Nazdik", director:"Abbas Kiarostami", year:1990, theme:["Identidad","Cine dentro del cine","Clase media"], region:"Teherán", awards:["Top 10 Sight & Sound"], desc:"Un hombre pobre se hace pasar por el director Mohsen Makhmalbaf. Documental y ficción fundidos en una obra maestra absoluta.", difficulty:"Iniciado", color:"#c8a96e" },
  { title:"Y la vida continúa", original:"Zendegi va digar hich", director:"Abbas Kiarostami", year:1992, theme:["Terremoto","Supervivencia","Vida rural"], region:"Norte (Golestán/Koker)", awards:["Premio Especial Cannes"], desc:"Kiarostami regresa a Koker destruida por el terremoto de 1990 buscando a los actores de su película anterior.", difficulty:"Accesible", color:"#c8a96e" },
  { title:"A través de los olivos", original:"Zir-e darakhatan zeyton", director:"Abbas Kiarostami", year:1994, theme:["Amor","Vida rural","Cine dentro del cine"], region:"Norte (Golestán)", awards:["Nominada Palma de Oro Cannes"], desc:"Tercer film de la trilogía Koker. Un actor no profesional está enamorado de su compañera durante el rodaje.", difficulty:"Iniciado", color:"#c8a96e" },
  { title:"El sabor de las cerezas", original:"Ta'm e guilass", director:"Abbas Kiarostami", year:1997, theme:["Muerte","Suicidio","Filosofía"], region:"Teherán (periferia)", awards:["Palma de Oro Cannes"], desc:"Un hombre busca a alguien que lo entierre después de suicidarse. Meditación filosófica sobre la vida que deja sin palabras.", difficulty:"Avanzado", color:"#c8a96e" },
  { title:"El viento nos llevará", original:"Bad ma ra khahad bord", director:"Abbas Kiarostami", year:1999, theme:["Muerte","Vida rural","Modernidad vs tradición"], region:"Kurdistán iraní", awards:["León de Plata Venecia"], desc:"Un equipo espera la muerte de una anciana en un pueblo kurdo. La espera como forma de vivir.", difficulty:"Avanzado", color:"#c8a96e" },
  { title:"El globo blanco", original:"Badkonak-e sefid", director:"Jafar Panahi", year:1995, theme:["Infancia","Año Nuevo persa","Teherán"], region:"Teherán", awards:["Cámara de Oro Cannes"], desc:"Una niña quiere comprar un pez dorado para Año Nuevo. Guión de Kiarostami. La primera obra maestra de Panahi.", difficulty:"Accesible", color:"#7a9e8a" },
  { title:"El espejo", original:"Ayneh", director:"Jafar Panahi", year:1997, theme:["Infancia","Cine dentro del cine","Teherán"], region:"Teherán", awards:["Leopardo de Oro Locarno"], desc:"Una niña abandona la película que rodaba a mitad. La cámara la sigue igual. Una de las rupturas más radicales del cine.", difficulty:"Avanzado", color:"#7a9e8a" },
  { title:"El círculo", original:"Dayereh", director:"Jafar Panahi", year:2000, theme:["Mujeres","Represión","Derechos humanos"], region:"Teherán", awards:["León de Oro Venecia"], desc:"Varias mujeres intentan sobrevivir un día en Teherán. Un círculo kafkiano de opresión sin salida. Prohibida en Irán.", difficulty:"Iniciado", color:"#7a9e8a" },
  { title:"Crimson Gold", original:"Talaye Sorkh", director:"Jafar Panahi", year:2003, theme:["Clase obrera","Desigualdad","Violencia"], region:"Teherán", awards:["Un Certain Regard Cannes"], desc:"Un repartidor de pizza atraca una joyería. Guión de Kiarostami. La brecha de clases en Teherán vista desde abajo.", difficulty:"Iniciado", color:"#7a9e8a" },
  { title:"Offside", original:"Offside", director:"Jafar Panahi", year:2006, theme:["Mujeres","Fútbol","Resistencia cotidiana"], region:"Teherán", awards:["Oso de Plata Berlín"], desc:"Mujeres disfrazadas de hombres intentan entrar al estadio durante un partido real de clasificación al Mundial.", difficulty:"Accesible", color:"#7a9e8a" },
  { title:"Esto no es una película", original:"In film nist", director:"Jafar Panahi", year:2011, theme:["Censura","Cine dentro del cine","Resistencia"], region:"Teherán", awards:["Cannes (presentada clandestinamente)"], desc:"Filmada en secreto con un iPhone bajo arresto domiciliario. Sacada de Irán en un pendrive escondido en una torta.", difficulty:"Avanzado", color:"#7a9e8a" },
  { title:"Taxi", original:"Taxi", director:"Jafar Panahi", year:2015, theme:["Censura","Cotidianeidad","Teherán"], region:"Teherán", awards:["Oso de Oro Berlín"], desc:"Panahi conduce un taxi con una cámara en el tablero. Sus pasajeros hablan de la vida real. El cine más libre bajo la mayor represión.", difficulty:"Accesible", color:"#7a9e8a" },
  { title:"Los niños del cielo", original:"Bacheha-Ye aseman", director:"Majid Majidi", year:1997, theme:["Infancia","Pobreza","Familia"], region:"Teherán (barrios populares)", awards:["Nominada Oscar Mejor Película Extranjera"], desc:"Dos hermanos comparten un par de zapatos. Primera nominación iraní al Oscar. Humanismo puro sin sentimentalismo.", difficulty:"Accesible", color:"#8a7ab5" },
  { title:"El color del paraíso", original:"Rang-e khoda", director:"Majid Majidi", year:1999, theme:["Discapacidad","Fe","Naturaleza"], region:"Norte (bosques del Alborz)", awards:["Premio del Público Montreal"], desc:"Un niño ciego, su padre y la naturaleza del norte de Irán. Las texturas del bosque gilaki filmadas para que el espectador las sienta.", difficulty:"Accesible", color:"#8a7ab5" },
  { title:"Baran", original:"Baran", director:"Majid Majidi", year:2001, theme:["Migración","Amor","Clase obrera"], region:"Teherán (obra de construcción)", awards:["Crystal Bear Berlín"], desc:"Un trabajador iraní se enamora de un refugiado afgano disfrazado de mujer. La migración afgana vista con ternura devastadora.", difficulty:"Accesible", color:"#8a7ab5" },
  { title:"La canción de los gorriones", original:"Avaze gonjeshkha", director:"Majid Majidi", year:2008, theme:["Familia","Campo vs ciudad","Clase obrera"], region:"Teherán / Norte de Irán", awards:["Crystal Bear Berlín"], desc:"Un criador de avestruces llega a Teherán. El contraste entre campo y ciudad iraní filmado con poesía visual única.", difficulty:"Accesible", color:"#8a7ab5" },
  { title:"A Separation", original:"Jodaeiye Nader az Simin", director:"Asghar Farhadi", year:2011, theme:["Divorcio","Clase media","Moral"], region:"Teherán", awards:["Oscar Mejor Película Extranjera","Oso de Oro Berlín"], desc:"Una pareja decide divorciarse. Thriller moral sin villanos donde todos tienen razón y todos mienten.", difficulty:"Accesible", color:"#c87070" },
  { title:"El pasado", original:"Le Passé", director:"Asghar Farhadi", year:2013, theme:["Familia","Secretos","Divorcio"], region:"París (iraní en Francia)", awards:["Premio del Jurado Cannes"], desc:"Un iraní vuelve a París para firmar el divorcio. Lo que parece simple se complica infinitamente.", difficulty:"Iniciado", color:"#c87070" },
  { title:"El viajante", original:"Forushande", director:"Asghar Farhadi", year:2016, theme:["Honor","Trauma","Clase media"], region:"Teherán", awards:["Oscar Mejor Película Extranjera"], desc:"Una pareja de actores ensaya 'Muerte de un viajante' mientras su vida real se convierte en una versión iraní de la obra.", difficulty:"Iniciado", color:"#c87070" },
  { title:"Un héroe", original:"Ghahreman", director:"Asghar Farhadi", year:2021, theme:["Honor","Redes sociales","Sistema judicial"], region:"Shiraz", awards:["Gran Premio Jurado Cannes"], desc:"Un preso devuelve una bolsa de monedas. Se convierte en héroe viral. La trampa de la fama instantánea en Irán.", difficulty:"Iniciado", color:"#c87070" },
  { title:"Un tiempo para caballos borrachos", original:"Zamani barayé masti asbha", director:"Bahman Ghobadi", year:2000, theme:["Familia","Supervivencia","Kurdos"], region:"Kurdistán iraní (invierno)", awards:["Cámara de Oro Cannes"], desc:"Hermanos kurdos en el invierno brutal de la frontera intentando salvar al menor enfermo.", difficulty:"Iniciado", color:"#6a9e7a" },
  { title:"Tortugas pueden volar", original:"Lakposhtha hâm parvaz mikonand", director:"Bahman Ghobadi", year:2004, theme:["Guerra","Infancia","Kurdos"], region:"Kurdistán (frontera Iraq-Turquía)", awards:["Globo de Oro Europa","Premio Especial Berlín"], desc:"Niños kurdos recogen minas para vender antes de la invasión americana. Sin adultos en el reparto.", difficulty:"Iniciado", color:"#6a9e7a" },
  { title:"No hay mal", original:"Sheytan vojud nadarad", director:"Mohammad Rasoulof", year:2020, theme:["Pena de muerte","Complicidad","Moral"], region:"Varias regiones de Irán", awards:["Oso de Oro Berlín"], desc:"Cuatro historias sobre la pena de muerte y la responsabilidad individual. Filmada en secreto.", difficulty:"Avanzado", color:"#b05050" },
  { title:"La semilla del higo sagrado", original:"Daneshjooye mohandesi", director:"Mohammad Rasoulof", year:2024, theme:["Represión","Familia","Mujer Vida Libertad"], region:"Teherán", awards:["Premio Especial Jurado Cannes"], desc:"Un juez lleva el arma del Estado a casa. Sus hijas participan en las protestas. Filmada mientras huía de Irán.", difficulty:"Iniciado", color:"#b05050" },
  { title:"Fue solo un accidente", original:"In Film Nist 2", director:"Jafar Panahi", year:2024, theme:["Tortura","Memoria","Sistema judicial"], region:"Teherán", awards:["Nominada Oscar 2025"], desc:"Un ex preso cree reconocer a su torturador en un accidente. Thriller político escrito en la cárcel de Evin.", difficulty:"Iniciado", color:"#7a9e8a" },
];

const directorColors = {
  "Abbas Kiarostami":"#c8a96e","Jafar Panahi":"#7a9e8a",
  "Majid Majidi":"#8a7ab5","Asghar Farhadi":"#c87070",
  "Bahman Ghobadi":"#6a9e7a","Mohammad Rasoulof":"#b05050"
};

let currentSort="year_asc", filterDirector="", filterDifficulty="", filterTheme="", filterDirLegend="", openCard=null;
const diffOrder={Accesible:1,Iniciado:2,Avanzado:3};

// Populate selects
const directors=[...new Set(films.map(f=>f.director))].sort();
const themes=[...new Set(films.flatMap(f=>f.theme))].sort();
const selDir=document.getElementById("sel-director");
directors.forEach(d=>{const o=document.createElement("option");o.value=d;o.textContent=d;selDir.appendChild(o);});
const selTheme=document.getElementById("sel-theme");
themes.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;selTheme.appendChild(o);});

// Director legend
const legend=document.getElementById("dir-legend");
directors.forEach(d=>{
  const count=films.filter(f=>f.director===d).length;
  const el=document.createElement("div");
  el.className="dir-item";el.dataset.dir=d;
  el.innerHTML=`<div class="dir-dot" style="background:${directorColors[d]}"></div><span class="dir-name">${d}</span><span class="dir-count">(${count})</span>`;
  el.addEventListener("click",()=>{filterDirLegend=filterDirLegend===d?"":d;filterDirector=filterDirLegend;selDir.value=filterDirLegend;render();});
  legend.appendChild(el);
});

function getFiltered(){
  return films
    .filter(f=>!filterDirector||f.director===filterDirector)
    .filter(f=>!filterDifficulty||f.difficulty===filterDifficulty)
    .filter(f=>!filterTheme||f.theme.includes(filterTheme))
    .sort((a,b)=>{
      if(currentSort==="year_asc")return a.year-b.year;
      if(currentSort==="year_desc")return b.year-a.year;
      if(currentSort==="director")return a.director.localeCompare(b.director);
      if(currentSort==="difficulty")return diffOrder[a.difficulty]-diffOrder[b.difficulty];
      return 0;
    });
}

function render(){
  const filtered=getFiltered();
  document.getElementById("count-label").textContent=`${filtered.length} película${filtered.length!==1?"s":""}`;
  document.querySelectorAll(".dir-item").forEach(el=>el.classList.toggle("dimmed",!!filterDirLegend&&el.dataset.dir!==filterDirLegend));
  const grid=document.getElementById("films-grid");
  if(!filtered.length){grid.innerHTML=`<div class="no-results">Sin resultados para esa combinación</div>`;return;}
  grid.innerHTML="";
  filtered.forEach(film=>{
    const diffClass=film.difficulty==="Accesible"?"diff-a":film.difficulty==="Iniciado"?"diff-i":"diff-v";
    const isOpen=openCard===film.title;
    const card=document.createElement("div");
    card.className="film-card"+(isOpen?" open":"");
    card.style.setProperty("--col",film.color);
    card.innerHTML=`
      <div class="film-card-top"><span class="film-year">${film.year}</span><span class="film-diff ${diffClass}">${film.difficulty}</span></div>
      <div class="film-title">${film.title}</div>
      <div class="film-original">${film.original}</div>
      <div class="film-director">${film.director}</div>
      <div class="film-desc">${film.desc}</div>
      <div class="film-themes">${film.theme.map(t=>`<span class="theme-tag">${t}</span>`).join("")}</div>
      <div class="film-extra">
        <div class="film-extra-row">📍 ${film.region}</div>
        <div class="film-extra-row">🏆 ${film.awards.join(" · ")}</div>
      </div>`;
    card.addEventListener("click",()=>{openCard=openCard===film.title?null:film.title;render();});
    grid.appendChild(card);
  });
}

document.querySelectorAll(".sort-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    currentSort=btn.dataset.sort;
    document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");render();
  });
});
document.getElementById("sel-director").addEventListener("change",e=>{filterDirector=e.target.value;filterDirLegend=e.target.value;render();});
document.getElementById("sel-difficulty").addEventListener("change",e=>{filterDifficulty=e.target.value;render();});
document.getElementById("sel-theme").addEventListener("change",e=>{filterTheme=e.target.value;render();});

// PWA install prompt
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById("install-banner").classList.add("show");
});
document.getElementById("install-btn").addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById("install-banner").classList.remove("show");
});
document.getElementById("dismiss-btn").addEventListener("click",()=>{
  document.getElementById("install-banner").classList.remove("show");
});

// Register service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}

render();
</script>
</body>
</html>
